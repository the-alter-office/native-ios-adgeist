name: Bug Report
description: Report a problem with the AdgeistKit iOS SDK
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please share as much detail as you can so we can reproduce and fix the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: e.g. AdView fails to load a creative and returns an empty response.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Add `pod 'AdgeistKit'` to the Podfile
        2. Initialize AdgeistCore with publisher ID
        3. Call AdView / FetchCreativeRequest ...
        4. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: The creative should render in the AdView.
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages.
      placeholder: AdListener.onError was called with ...
  - type: input
    id: sdk-version
    attributes:
      label: AdgeistKit version
      description: Which version of the SDK are you using? (see `pod 'AdgeistKit'` / podspec)
      placeholder: e.g. 1.0.14-beta
  - type: input
    id: ios-version
    attributes:
      label: iOS version / device
      description: The iOS version and device or simulator where the issue occurs.
      placeholder: e.g. iOS 17.4, iPhone 15 Pro (simulator)
  - type: input
    id: xcode-version
    attributes:
      label: Xcode version
      placeholder: e.g. Xcode 16.0
  - type: dropdown
    id: integration
    attributes:
      label: Integration method
      options:
        - CocoaPods (Podfile)
        - CocoaPods (.podspec dependency)
        - Manual / vendored xcframework
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / console output
      description: Paste any console output, stack traces, or crash logs. This will be formatted as code automatically.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here (Info.plist keys, network conditions, etc.).
